<script>
/**
 * Capstone Impact Showcase - Duda Public Layer Script
 * Refactored for Dedicated Page Routing and Premium Detail Design.
 * Fully supports Prototype v2 public feed schema including layoutConfig.
 */

// --- CONFIGURATION ---
// IMPORTANT: This is the verified stable public feed URL. 
// Do not use the older similar-looking URL.
const CAPSTONE_FEED_URL = "https://xojnnhilqaldxoilmxli.supabase.co/storage/v1/object/public/feeds/capstones-latest.json";

// --- STATE ---
let allProjects = [];
let isInitialized = false;
let currentFilters = {
    year: 'All',
    program: 'All',
    discipline: 'All',
    industry: 'All'
};

// --- LIGHTBOX STATE ---
let currentSnapshotIndex = 0;
let lightboxKeyHandler = null;
let previousBodyOverflow = "";

// --- UTILS ---
const escapeHTML = (str) => {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
};

const getQueryParam = (name) => {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
};

const buildDetailUrl = (projectId) => {
    // Standardizing on /project-detail?id=...
    const path = window.location.pathname.includes('project-detail') ? '' : 'project-detail';
    return `${path}?id=${projectId}`;
};

const saveSelectedProject = (id) => {
    localStorage.setItem('selectedProjectId', id);
};

const isMp4 = (url) => {
    if (!url) return false;
    return url.toLowerCase().split('?')[0].endsWith('.mp4');
};

const getEmbedUrl = (url) => {
    if (!url) return "";
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
        const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        if (match && match[2] && match[2].length === 11) {
            return `https://www.youtube.com/embed/${match[2]}`;
        }
    }
    if (url.includes("vimeo.com")) {
        const match = url.match(/^.*(vimeo\.com\/|video\/)([^#\&\?]*).*/);
        if (match && match[2]) {
            const id = match[2].split('/')[0].trim();
            if (/^\d+$/.test(id)) {
                return `https://player.vimeo.com/video/${id}`;
            }
        }
    }
    return "";
};

const renderVideo = (url) => {
    if (!url) return '';
    const escapedUrl = escapeHTML(url);
    if (isMp4(url)) {
        return `
            <div class="capstone-video-container">
                <video class="capstone-video-player" src="${escapedUrl}" controls preload="metadata"></video>
            </div>
        `;
    }
    const embed = getEmbedUrl(url);
    if (embed) {
        const escapedEmbed = escapeHTML(embed);
        return `
            <div class="capstone-video-container">
                <iframe class="capstone-video-iframe" src="${escapedEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        `;
    }
    return `
        <p class="section-text">
            <a href="${escapedUrl}" class="btn-get-poster" style="width: auto; padding: 10px 20px;" target="_blank" rel="noopener noreferrer">
                View Project Presentation Video
            </a>
        </p>
    `;
};

const getFilterOptions = () => {
    const years = new Set();
    const programs = new Set();
    const disciplines = new Set();
    const industries = new Set();

    allProjects.forEach(p => {
        if (p.year) years.add(String(p.year).trim());

        const prog = String(p.program || p.studyProgram || '').trim();
        if (prog) programs.add(prog);

        if (Array.isArray(p.disciplines)) {
            p.disciplines.forEach(d => {
                if (d) disciplines.add(String(d).trim());
            });
        } else if (p.discipline) {
            disciplines.add(String(p.discipline).trim());
        }

        if (p.industry) industries.add(String(p.industry).trim());
    });

    return {
        years: ['All', ...Array.from(years).sort((a, b) => b - a)],
        programs: ['All', ...Array.from(programs).sort()],
        disciplines: ['All', ...Array.from(disciplines).sort()],
        industries: ['All', ...Array.from(industries).sort()]
    };
};

// --- CORE LOGIC ---

const initShowcase = async (retryCount = 0) => {
    if (isInitialized) return;

    const listingContainer = document.getElementById('capstone-project-grid');
    const detailContainer = document.getElementById('project-detail');

    if (!listingContainer && !detailContainer) {
        if (retryCount < 10) {
            setTimeout(() => initShowcase(retryCount + 1), 500);
        }
        return;
    }

    isInitialized = true;
    console.log('[Showcase] Capstone script loaded');

    try {
        const feedRequestUrl = `${CAPSTONE_FEED_URL}?v=${Date.now()}`;
        console.log('[Showcase] Fetching feed:', feedRequestUrl);

        const response = await fetch(feedRequestUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}: Failed to fetch feed.`);
        
        allProjects = await response.json();
        console.log(`[Showcase] Records received: ${allProjects.length}`);
        console.log('[Showcase] Project titles:', allProjects.map(p => p.title));

        // Routing logic
        if (detailContainer && window.location.pathname.includes('project-detail')) {
            const projectId = getQueryParam('id') || localStorage.getItem('selectedProjectId');
            if (projectId) {
                showDetail(projectId);
            } else {
                detailContainer.innerHTML = '<p style="color:#111; text-align:center; padding:50px;">Project not specified. <a href="sst-school-projects" style="color:#3b82f6;">Return to Showcase</a></p>';
            }
        } else if (listingContainer) {
            localStorage.removeItem('selectedProjectId');
            renderListing();
        }
    } catch (err) {
        console.error('[Showcase] Error:', err);
        const errorHtml = `
            <div class="capstone-inline-error">
                <strong>Unable to load projects.</strong><br>
                ${err.message}<br>
                <small>Check CAPSTONE_FEED_URL and public bucket access.</small>
            </div>
        `;
        if (listingContainer) listingContainer.innerHTML = errorHtml;
        if (detailContainer) detailContainer.innerHTML = errorHtml;
    }
};

const renderFilters = () => {
    const root = document.getElementById('capstone-showcase-root');
    if (!root) return;

    let filtersContainer = document.getElementById('capstone-filters-container');
    if (!filtersContainer) {
        filtersContainer = document.createElement('div');
        filtersContainer.id = 'capstone-filters-container';

        const grid = document.getElementById('capstone-project-grid');
        if (grid && grid.parentNode === root) {
            root.insertBefore(filtersContainer, grid);
        } else {
            root.appendChild(filtersContainer);
        }
    }

    const options = getFilterOptions();

    filtersContainer.innerHTML = `
        <div class="capstone-filter-group">
            <label for="filter-year">Year</label>
            <select id="filter-year" onchange="handleFilterChange('year', this.value)">
                ${options.years.map(y => `<option value="${escapeHTML(y)}" ${currentFilters.year === y ? 'selected' : ''}>${escapeHTML(y)}</option>`).join('')}
            </select>
        </div>
        <div class="capstone-filter-group">
            <label for="filter-program">Program</label>
            <select id="filter-program" onchange="handleFilterChange('program', this.value)">
                ${options.programs.map(p => `<option value="${escapeHTML(p)}" ${currentFilters.program === p ? 'selected' : ''}>${escapeHTML(p)}</option>`).join('')}
            </select>
        </div>
        <div class="capstone-filter-group">
            <label for="filter-discipline">Discipline</label>
            <select id="filter-discipline" onchange="handleFilterChange('discipline', this.value)">
                ${options.disciplines.map(d => `<option value="${escapeHTML(d)}" ${currentFilters.discipline === d ? 'selected' : ''}>${escapeHTML(d)}</option>`).join('')}
            </select>
        </div>
        <div class="capstone-filter-group">
            <label for="filter-industry">Industry Sector</label>
            <select id="filter-industry" onchange="handleFilterChange('industry', this.value)">
                ${options.industries.map(i => `<option value="${escapeHTML(i)}" ${currentFilters.industry === i ? 'selected' : ''}>${escapeHTML(i)}</option>`).join('')}
            </select>
        </div>
    `;
};

const renderListingCards = () => {
    const grid = document.getElementById('capstone-project-grid');
    if (!grid) return;

    // Filter projects client-side
    const filteredProjects = allProjects.filter(p => {
        if (currentFilters.year !== 'All' && String(p.year) !== currentFilters.year) return false;

        if (currentFilters.program !== 'All') {
            const prog = String(p.program || p.studyProgram || '').trim();
            if (prog !== currentFilters.program) return false;
        }

        if (currentFilters.discipline !== 'All') {
            if (Array.isArray(p.disciplines)) {
                if (!p.disciplines.map(d => String(d).trim()).includes(currentFilters.discipline)) return false;
            } else {
                const disc = String(p.discipline || '').trim();
                if (disc !== currentFilters.discipline) return false;
            }
        }

        if (currentFilters.industry !== 'All' && String(p.industry || '') !== currentFilters.industry) return false;

        return true;
    });

    if (filteredProjects.length === 0) {
        grid.innerHTML = '<p style="text-align:center; padding: 60px 10px; color: #ffffff; font-size: 1.15rem; width: 100%;">No projects match the selected filters.</p>';
        return;
    }

    const groups = filteredProjects.reduce((acc, p) => {
        const year = p.year || 'Unknown';
        acc[year] = acc[year] || [];
        acc[year].push(p);
        return acc;
    }, {});

    const sortedYears = Object.keys(groups).sort((a, b) => b - a);
    console.log('[Showcase] Filtered years detected:', sortedYears);

    grid.innerHTML = sortedYears.map(year => `
        <div class="capstone-year-section">
            <h2 class="capstone-year-heading">${escapeHTML(year)} Projects</h2>
            <div class="capstone-projects-grid">
                ${groups[year].map(p => `
                    <div class="capstone-card">
                        <button class="capstone-poster-link" type="button" onclick="handleProjectClick('${p.id}')" aria-label="View ${escapeHTML(p.title)} project detail">
                            <img class="capstone-card-image" src="${p.poster || 'https://via.placeholder.com/400x600?text=No+Poster'}" alt="${escapeHTML(p.title)}" loading="lazy">
                        </button>
                        <button class="capstone-card-btn" type="button" onclick="handleProjectClick('${p.id}')">Learn More</button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
};

const renderListing = () => {
    renderFilters();
    renderListingCards();
    console.log('[Showcase] Listing render complete');
};

const showDetail = (id) => {
    const container = document.getElementById('project-detail');
    if (!container) return;

    const project = allProjects.find(p => String(p.id) === String(id));
    if (!project) {
        container.innerHTML = '<p style="color:#111; text-align:center; padding:50px;">Project not found. <a href="sst-school-projects" style="color:#3b82f6;">Back to Showcase</a></p>';
        return;
    }

    window.scrollTo(0, 0);
    container.innerHTML = renderProjectDetail(project);
};

const renderProjectDetail = (project) => {
    const layoutConfig = project.layoutConfig || {};
    const featuredMedia = layoutConfig.featuredMedia || "poster";
    const sectionOrder = Array.isArray(layoutConfig.sectionOrder) ? layoutConfig.sectionOrder : [
        "background", "solution", "snapshots", "video", "team", "links"
    ];
    const hiddenSections = Array.isArray(layoutConfig.hiddenSections) ? layoutConfig.hiddenSections : [];

    const isHidden = (sec) => {
        if (hiddenSections.includes(sec)) return true;
        if (sec === 'links' && hiddenSections.includes('externalLinks')) return true;
        if (sec === 'externalLinks' && hiddenSections.includes('links')) return true;
        return false;
    };

    const canShowVideo = !!(project.videoUrl && !isHidden("video"));
    const snapshots = Array.isArray(project.snapshots) ? project.snapshots : [];
    const canShowSnapshots = !!(snapshots.length > 0 && !isHidden("snapshots"));
    const canShowPoster = !!(project.poster && !isHidden("poster"));

    let elevatedMedia = "none";
    if (featuredMedia !== "none") {
        if (featuredMedia === "video" && canShowVideo) elevatedMedia = "video";
        else if ((featuredMedia === "gallery" || featuredMedia === "snapshots") && canShowSnapshots) elevatedMedia = "snapshots";
        else if (featuredMedia === "poster" && canShowPoster) elevatedMedia = "poster";
        else {
            if (canShowVideo) elevatedMedia = "video";
            else if (canShowSnapshots) elevatedMedia = "snapshots";
            else if (canShowPoster) elevatedMedia = "poster";
        }
    }

    if (elevatedMedia === "none" && canShowPoster && !canShowVideo && !canShowSnapshots) {
        elevatedMedia = "poster";
    }

    let elevatedMediaHTML = "";
    if (elevatedMedia === "video") {
        elevatedMediaHTML = `
            <div class="detail-section elevated-media-section">
                ${renderVideo(project.videoUrl)}
            </div>
        `;
    } else if (elevatedMedia === "snapshots") {
        elevatedMediaHTML = `
            <div class="detail-section elevated-media-section">
                <div class="snapshot-grid">
                    ${snapshots.map((url, idx) => `
                        <div class="snapshot-card" onclick="openLightbox(${idx})">
                            <div class="snapshot-inner">
                                <img src="${url}" alt="Snapshot ${idx + 1}" loading="lazy">
                                <div class="snapshot-overlay">
                                    <span class="view-icon">🔍</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    const allPossibleSections = ["background", "solution", "snapshots", "video", "team", "links", "externalLinks", "citations", "accessibilityText"];
    const fullOrder = [...sectionOrder];
    allPossibleSections.forEach(sec => {
        if (!fullOrder.includes(sec)) {
            if (sec === 'links' && fullOrder.includes('externalLinks')) return;
            if (sec === 'externalLinks' && fullOrder.includes('links')) return;
            fullOrder.push(sec);
        }
    });

    const bodySectionsHTML = fullOrder.map(sec => {
        if (isHidden(sec)) return '';

        if (sec === "video" && elevatedMedia === "video") return '';
        if (sec === "snapshots" && elevatedMedia === "snapshots") return '';

        if (sec === "background" && project.background) {
            return `
                <div class="detail-section">
                    <h3 class="section-title">Background</h3>
                    <p class="section-text">${escapeHTML(project.background)}</p>
                </div>
            `;
        }
        if (sec === "solution" && project.solution) {
            return `
                <div class="detail-section">
                    <h3 class="section-title">The Solution</h3>
                    <p class="section-text">${escapeHTML(project.solution)}</p>
                </div>
            `;
        }
        if (sec === "snapshots" && snapshots.length > 0) {
            return `
                <div class="detail-section">
                    <h3 class="section-title">Project Snapshots</h3>
                    <div class="snapshot-grid">
                        ${snapshots.map((url, idx) => `
                            <div class="snapshot-card" onclick="openLightbox(${idx})">
                                <div class="snapshot-inner">
                                    <img src="${url}" alt="Snapshot ${idx + 1}" loading="lazy">
                                    <div class="snapshot-overlay">
                                        <span class="view-icon">🔍</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        if (sec === "video" && project.videoUrl) {
            return `
                <div class="detail-section">
                    <h3 class="section-title">Project Video</h3>
                    ${renderVideo(project.videoUrl)}
                </div>
            `;
        }
        if (sec === "team") {
            const teamMembers = Array.isArray(project.teamMembers) ? project.teamMembers : (project.teamMembers ? [project.teamMembers] : []);
            if (teamMembers.length > 0) {
                return `
                    <div class="detail-section">
                        <h3 class="section-title">The Team</h3>
                        <div class="team-container">
                            ${project.groupName ? `<p class="group-name">${escapeHTML(project.groupName)}</p>` : ''}
                            <ul class="team-chips">
                                ${teamMembers.map(m => `<li class="team-chip">${escapeHTML(m)}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }
        }
        if (sec === "citations") {
            const citations = Array.isArray(project.citations) ? project.citations : (project.citations ? [project.citations] : []);
            if (citations.length > 0) {
                return `
                    <div class="detail-section">
                        <h3 class="section-title">Citations</h3>
                        <div class="team-container" style="padding: 1.5rem 2rem;">
                            <ul class="metadata-list" style="gap: 1rem; padding: 0; margin: 0;">
                                ${citations.map(c => `
                                    <li style="font-size: 0.95rem; color: #cbd5e1; list-style: none; padding: 0; margin: 0;">• ${escapeHTML(c)}</li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }
        }
        if ((sec === "links" || sec === "externalLinks")) {
            const extLinks = Array.isArray(project.externalLinks) ? project.externalLinks : [];
            const hasLinks = project.demoUrl || project.repositoryUrl || extLinks.length > 0;
            if (hasLinks) {
                return `
                    <div class="detail-section">
                        <h3 class="section-title">Resources</h3>
                        <div class="resources-container" style="display: flex; flex-wrap: wrap; gap: 12px;">
                            ${project.demoUrl ? `<a href="${escapeHTML(project.demoUrl)}" class="btn-get-poster" target="_blank" rel="noopener noreferrer" style="width: auto; padding: 10px 20px;">Open Live Demo</a>` : ''}
                            ${project.repositoryUrl ? `<a href="${escapeHTML(project.repositoryUrl)}" class="btn-get-poster" target="_blank" rel="noopener noreferrer" style="width: auto; padding: 10px 20px; border-color: #cbd5e1; color: #cbd5e1;">View Code Repository</a>` : ''}
                            ${extLinks.map(lnk => `<a href="${escapeHTML(lnk.url)}" class="btn-get-poster" target="_blank" rel="noopener noreferrer" style="width: auto; padding: 10px 20px; border-color: rgba(255,255,255,0.4); color: #93c5fd;">${escapeHTML(lnk.label || 'Project Link')}</a>`).join('')}
                        </div>
                    </div>
                `;
            }
        }
        if (sec === "accessibilityText" && project.accessibilityText) {
            return `
                <div class="detail-section">
                    <h3 class="section-title">Accessibility Text</h3>
                    <p class="section-text">${escapeHTML(project.accessibilityText)}</p>
                </div>
            `;
        }
        return '';
    }).join('');

    const posterAlt = project.accessibilityText || project.imageAlt || project.title || "Project Poster";
    const showMetadata = !isHidden("metadata");
    const showPoster = !isHidden("poster");
    const showPosterPdf = !isHidden("posterPdf") && (project.posterPdf || project.poster);

    return `
        <div class="detail-header">
            <button class="btn-back" onclick="goBack()">
                <span class="back-icon">←</span> Return to Showcase
            </button>
            <div class="detail-title-block">
                <h1>${escapeHTML(project.title)}</h1>
                <p class="detail-meta">
                    <span class="meta-program">${escapeHTML(project.program || project.studyProgram || 'N/A')}</span>
                    <span class="meta-sep">|</span>
                    <span class="meta-year">${project.year || 'N/A'}</span>
                </p>
                ${project.summary ? `
                    <p class="section-text" style="margin-top: 2.5rem; font-style: italic; opacity: 0.9;">
                        ${escapeHTML(project.summary)}
                    </p>
                ` : ''}
            </div>
        </div>

        <div class="detail-content-grid">
            <div class="detail-main">
                ${elevatedMediaHTML}
                ${bodySectionsHTML}
            </div>

            <aside class="detail-sidebar">
                <div class="sticky-sidebar">
                    ${showPoster ? `
                        <div class="sidebar-poster-card">
                            <img src="${project.poster || 'https://via.placeholder.com/400x600?text=No+Poster'}" alt="${escapeHTML(posterAlt)}" class="poster-img">
                        </div>
                    ` : ''}

                    ${showPosterPdf ? `
                        <div class="sidebar-action">
                            <a href="${project.posterPdf || project.poster}" class="btn-get-poster" target="_blank" rel="noopener noreferrer">
                                ${project.posterPdf ? 'Get Project Poster (PDF)' : 'View Project Poster'}
                            </a>
                        </div>
                    ` : ''}

                    ${showMetadata ? `
                        <div class="sidebar-metadata-card">
                            <h4 class="card-title">Project Details</h4>
                            <div class="metadata-list">
                                <div class="metadata-item">
                                    <span class="metadata-label">Industry Partner</span>
                                    <p class="metadata-value">${escapeHTML(project.industryPartner) || 'N/A'}</p>
                                </div>
                                <div class="metadata-item">
                                    <span class="metadata-label">Academic Supervisor</span>
                                    <p class="metadata-value">${escapeHTML(project.academicSupervisor || project.supervisor) || 'N/A'}</p>
                                </div>
                                <div class="metadata-item">
                                    <span class="metadata-label">Disciplines</span>
                                    <p class="metadata-value">
                                        ${Array.isArray(project.disciplines) ? escapeHTML(project.disciplines.join(', ')) : escapeHTML(project.disciplines || project.discipline) || 'N/A'}
                                    </p>
                                </div>
                                ${project.industry ? `
                                    <div class="metadata-item">
                                        <span class="metadata-label">Industry Sector</span>
                                        <p class="metadata-value">${escapeHTML(project.industry)}</p>
                                    </div>
                                ` : ''}
                                <div class="metadata-item">
                                    <span class="metadata-label">Program</span>
                                    <p class="metadata-value">${escapeHTML(project.program || project.studyProgram) || 'N/A'}</p>
                                </div>
                                <div class="metadata-item">
                                    <span class="metadata-label">Year</span>
                                    <p class="metadata-value">${project.year || 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            </aside>
        </div>
    `;
};

// --- LIGHTBOX LOGIC ---
const openLightbox = (index) => {
    const projectId = getQueryParam('id') || localStorage.getItem('selectedProjectId');
    const project = allProjects.find(p => String(p.id) === String(projectId));
    if (!project || !project.snapshots) return;
    
    currentSnapshotIndex = index;
    console.log(`[Showcase] Opening lightbox for snapshot ${index + 1} of ${project.snapshots.length}`, project.snapshots[index]);
    
    let lb = document.getElementById('capstone-lightbox');
    if (!lb) {
        lb = document.createElement('div');
        lb.id = 'capstone-lightbox';
        lb.style.cssText = "position:fixed; inset:0; z-index:2147483647; display:none; align-items:center; justify-content:center; background:rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); font-family:sans-serif; transition: all 0.3s ease;";
        lb.innerHTML = `
            <div class="capstone-lightbox-backdrop" style="position:absolute; inset:0; cursor:zoom-out;" onclick="closeLightbox()"></div>
            <div class="capstone-lightbox-content" style="position:relative; z-index:10; width:100%; height:100%; display:flex; align-items:center; justify-content:center; pointer-events:none;">
                <button type="button" class="capstone-lightbox-close" style="position:absolute; top:24px; right:24px; width:48px; height:48px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:50%; color:#fff; font-size:32px; cursor:pointer; z-index:20; pointer-events:auto; display:flex; align-items:center; justify-content:center; transition:all 0.2s ease;" onclick="closeLightbox()" aria-label="Close" onmouseover="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='scale(1.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='scale(1)'">&times;</button>
                
                <div class="capstone-lightbox-nav-wrapper" style="position:relative; display:flex; align-items:center; justify-content:center; width:100%; height:100%; pointer-events:auto;">
                    <button type="button" class="capstone-lightbox-prev" style="position:absolute; left:24px; width:64px; height:64px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:50%; color:#fff; font-size:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s ease;" onclick="event.stopPropagation(); changeSnapshot(-1)" onmouseover="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='scale(1.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='scale(1)'">‹</button>
                    
                    <div id="capstone-lightbox-img-container" style="max-width:90vw; max-height:85vh; display:flex; align-items:center; justify-content:center; position:relative;">
                        <img id="capstone-lightbox-img" style="max-width:100%; max-height:85vh; object-fit:contain; border-radius:12px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);" onclick="event.stopPropagation()">
                        <div id="capstone-lightbox-error" style="display:none; color:#fff; text-align:center; background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.5); padding:24px; border-radius:12px; backdrop-filter:blur(8px);">Snapshot image failed to load.</div>
                    </div>
                    
                    <button type="button" class="capstone-lightbox-next" style="position:absolute; right:24px; width:64px; height:64px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:50%; color:#fff; font-size:32px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s ease;" onclick="event.stopPropagation(); changeSnapshot(1)" onmouseover="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='scale(1.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='scale(1)'">›</button>
                </div>
            </div>
        `;
        document.body.appendChild(lb);

        const img = document.getElementById('capstone-lightbox-img');
        img.onerror = () => {
            console.error("[Showcase] Snapshot failed to load:", img.src);
            document.getElementById('capstone-lightbox-error').style.display = 'block';
            img.style.display = 'none';
        };
        img.onload = () => {
            document.getElementById('capstone-lightbox-error').style.display = 'none';
            img.style.display = 'block';
        };
    }

    updateLightbox(project);
    lb.style.display = 'flex';
    
    previousBodyOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';

    if (lightboxKeyHandler) document.removeEventListener('keydown', lightboxKeyHandler);
    lightboxKeyHandler = (e) => {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') changeSnapshot(-1);
        if (e.key === 'ArrowRight') changeSnapshot(1);
    };
    document.addEventListener('keydown', lightboxKeyHandler);
};

const updateLightbox = (project) => {
    const img = document.getElementById('capstone-lightbox-img');
    if (img && project.snapshots[currentSnapshotIndex]) {
        img.src = project.snapshots[currentSnapshotIndex];
    }
};

const changeSnapshot = (dir) => {
    const projectId = getQueryParam('id') || localStorage.getItem('selectedProjectId');
    const project = allProjects.find(p => String(p.id) === String(projectId));
    if (!project || !project.snapshots) return;
    currentSnapshotIndex = (currentSnapshotIndex + dir + project.snapshots.length) % project.snapshots.length;
    updateLightbox(project);
};

const closeLightbox = () => {
    console.log("[Showcase] Closing lightbox");
    const lb = document.getElementById('capstone-lightbox');
    if (lb) lb.style.display = 'none';
    
    document.body.style.overflow = previousBodyOverflow;
    
    if (lightboxKeyHandler) {
        document.removeEventListener('keydown', lightboxKeyHandler);
        lightboxKeyHandler = null;
    }
};

const handleFilterChange = (type, value) => {
    currentFilters[type] = value;
    renderListingCards();
};

// --- GLOBAL ATTACHMENTS FOR DUDA SCOPED RESOLUTION ---
window.handleFilterChange = handleFilterChange;
window.handleProjectClick = handleProjectClick;
window.goBack = goBack;
window.openLightbox = openLightbox;
window.closeLightbox = closeLightbox;
window.changeSnapshot = changeSnapshot;
window.navigateLightbox = changeSnapshot;

// --- RUNTIME ---
document.addEventListener('DOMContentLoaded', () => initShowcase());
window.addEventListener('load', () => initShowcase());

</script>
